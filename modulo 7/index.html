<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Curtidas Persistente</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="card">
    <h3>Quem curtiu esta postagem?</h3>
    <input type="text" id="nomeInput" placeholder="Digite seu nome...">
    <br>
    
    <div class="button-group">
        <button id="btnCurtir">Curtir</button>
        <button id="btnLimpar" class="btn-secondary">Limpar Tudo</button>
    </div>
    
    <p id="feedback-curtidas">Ninguém curtiu</p>
</div>

<script src="script.js"></script>
</body>
</html>
