<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerenciador de Tarefas Persistente</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="todo-app">

</div>

<script src="script.js"></script>
</body>
</html>
